AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'Weather Temperature Service

  '
Globals:
  Function:
    Timeout: 20
    MemorySize: 512
    LoggingConfig:
      LogFormat: JSON
Resources:
  TemperatureFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: TemperatureFunction
      Handler: weather.WeatherLambdaHandler::handleRequest
      Runtime: java21
      Architectures:
      - x86_64
      MemorySize: 512
      Environment:
        Variables:
          PARAM1: VALUE
      Events:
        Temperature:
          Type: Api
          Properties:
            Path: /temperature
            Method: get
    Metadata:
      SamResourceId: TemperatureFunction
Outputs:
  TemperatureApi:
    Description: API Gateway endpoint URL for getting current temperature function
    Value:
      Fn::Sub: https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/temperature/
  TemperatureFunction:
    Description: Temperature Lambda Function ARN
    Value:
      Fn::GetAtt:
      - TemperatureFunction
      - Arn
  TemperatureFunctionIamRole:
    Description: Implicit IAM Role created for Temperature function
    Value:
      Fn::GetAtt:
      - TemperatureFunctionRole
      - Arn
